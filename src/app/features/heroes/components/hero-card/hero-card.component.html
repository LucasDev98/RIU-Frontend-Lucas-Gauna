@let currentHero = hero();

<mat-card class="hero-card">
  <img mat-card-image [src]="currentHero.imageUrl" [alt]="currentHero.name" class="hero-image" />

  <mat-card-header>
    <mat-card-title>{{ currentHero.name }}</mat-card-title>
    <mat-card-subtitle>{{ currentHero.alias }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <p class="hero-power">{{ currentHero.power }}</p>
    <mat-chip-set>
      <mat-chip [class]="universeClass()">
        {{ currentHero.universe }}
      </mat-chip>
    </mat-chip-set>
  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-icon-button matTooltip="Edit" (click)="edit.emit(currentHero)">
      <mat-icon>edit</mat-icon>
    </button>
    <button mat-icon-button matTooltip="Delete" color="warn" (click)="delete.emit(currentHero)">
      <mat-icon>delete</mat-icon>
    </button>
  </mat-card-actions>
</mat-card>
