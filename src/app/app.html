<mat-toolbar class="app-toolbar">
  <button mat-icon-button (click)="toggleSidenav()" aria-label="Toggle menu">
    <mat-icon>menu</mat-icon>
  </button>

  <span class="toolbar-page-title">{{ navService.pageTitle() }}</span>

  <span class="toolbar-spacer"></span>

  <span class="app-title">HeroApp</span>
</mat-toolbar>

<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    class="app-sidenav"
    [mode]="isHandset() ? 'over' : 'side'"
    [opened]="sidenavOpen()"
  >
    <app-sidenav
      [items]="navService.navItems"
      (itemSelected)="closeSidenavOnMobile()"
    />
  </mat-sidenav>

  <mat-sidenav-content class="sidenav-content">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
