services:

  # ── Mock REST API ──────────────────────────────────────────────────────────
  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./db.json:/app/db.json
    command: sh -c "npm install -g json-server@0.17.4 && json-server --watch db.json --port 3000 --host 0.0.0.0"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/heroes"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Angular SSR ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "4000"
    environment:
      - PORT=4000
      - NODE_ENV=production
    depends_on:
      api:
        condition: service_healthy

  # ── Reverse Proxy ──────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - api
